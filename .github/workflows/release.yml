name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build plugin
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION_PREFIX=${VERSION%%-*}
          VERSION_SUFFIX=""
          if [[ "$VERSION" == *-* ]]; then
            VERSION_SUFFIX=${VERSION#*-}
          fi
          dotnet publish EmbyWeeklyDigest.Plugin/EmbyWeeklyDigest.Plugin.csproj -c Release -o artifacts/publish --no-self-contained \
            -p:VersionPrefix=$VERSION_PREFIX \
            -p:VersionSuffix=$VERSION_SUFFIX \
            -p:Version=$VERSION

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --no-merges --pretty=format:"- %s" | grep -v "Co-Authored-By"
            echo ""
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
            fi
          } > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/publish/EmbyWeeklyDigest.Plugin.dll
          body_path: release_notes.md
          draft: false
